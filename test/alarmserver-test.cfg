# =============================================
# ENVISALINK & PROXY CONNECTION
# =============================================
[envisalink]

host={IP}
port={PORT}
pass={USERNAME}

enableproxy=True
proxyport={PROXY_PORT}
proxypass={PROXY_USERNAME}

alarmcode={ALARMCODE}

# === NEW TIMEOUT / INTERVAL CONFIG OPTIONS (seconds) ===
# Envisalink client connection handling
keepaliveinterval = 8          # Seconds between keepalive polls (000 command). Default 8
zombietimeout = 15             # Seconds of inactivity before declaring connection zombie and forcing reconnect. Default 15
retrydelay = 10                # Seconds to wait before retrying a failed connection. Default 10
connecttimeout = 15            # TCP connect timeout in seconds. Default 15
initialreadtimeout = 15        # Timeout for initial banner/read after connect. Default 15
readtimeout = 25               # Timeout for normal message reads in main loop. Default 25

# Proxy (envisalinkproxy) settings
proxyreadtimeout = 300         # Max seconds a proxy client can be idle before disconnect (read timeout). Default 300 (5 min)
proxyacktimeout = 45           # Seconds to wait for a 500 ACK before giving up routing it to specific client. Default 45
proxyackstaletimeout = 60      # Seconds after which pending ACK entries are considered stale and cleaned. Default 60
proxyratelimit = 10            # Max commands allowed per rate window from one proxy client. Default 10
proxyratewindow = 1.0          # Rate limit window in seconds. Default 1.0
proxystatusinterval = 60       # Seconds between logging active proxy clients / cleanup. Default 60
proxymaxconnectionsperip = 5   # Max concurrent connections per client IP. Default 5

# TCP Keepalive (applied after successful connect)
tcpkeepalive = True
tcpkeepidle = 60
tcpkeepintvl = 15
tcpkeepcnt = 8

# Max retries for initial connect + runtime reconnects + login sequence
# 0 (or negative) = unlimited retries (recommended for production, keeps trying forever)
maxtries = 0


maxreconnectattempts = 5
maxreconnectattemptsexit = 15
sotimeout = 45                    # Main read timeout in handle_line loop (seconds)

# Login sequence (perform_login)
loginmaxattempts = 3
loginrequesttimeout = 15          # Seconds to wait for initial "505 3" password prompt
loginacktimeout = 10              # Seconds to wait for "500" ACK after sending password
loginconfirmtimeout = 10          # Seconds to wait for final "505 1" login confirmation

lograwmessage=False

# =============================================
# WEB SERVER SETTINGS
# =============================================
[alarmserver]

# Logging
#logfile=/var/AlarmServer/log/alarmserver.log
logurlrequests=False
#DEBUG INFO WARNING ERROR CRITICAL
loglevel={LOGLEVEL}


# HTTP / HTTPS
http=False
https=False
httpport=8011
httpsport=8111

# SSL Certificates
certfile=./server.crt
keyfile=./server.key

# Web authentication
webauthuser=user
webauthpass=test


# =============================================
# WEB INTERFACE SETTINGS
# =============================================
maxevents=10
maxallevents=100
eventtimeago=True


# =============================================
# PARTITIONS, ZONES AND USERS
# =============================================
# Partition names
partition1=HOME

# Zone names
zone1=A
zone2=B
zone3=C
zone4=D
zone5=E
zone6=F
zone7=G
zone8=H
zone9=I
zone10=J
zone11=K
zone12=L
zone13=M
zone14=N
zone15=O
zone16=P

# Ignore uknown zones && partitions
ignore_unknown_zones=True

# User names
#user1=
#user2=


# =============================================
# INTEGRATIONS
# =============================================
[pushover]
enable=False
usertoken=

[pushbullet]
enable=False
apikey=

[ifttt_maker]
enable=False
key=
eventName=

